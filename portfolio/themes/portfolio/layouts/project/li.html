<figure class="project">
  <img alt="" src="{{ .Params.image }}"/>
  <div class="project__image">
    <img alt="" src="{{ .Params.image }}"/>
  </div>
  <figcaption class="project__body">
    <h3 class="project__title" >{{ .Title }}</h3>
    <p class="project__summary">
      {{ .Summary }}
    </p>
  </figcaption>
  <a href={{ .URL }}></a>
</figure>
